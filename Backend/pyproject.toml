[tool.ruff]
# Standard for professional Python projects
line-length = 105
target-version = "py312"

[tool.ruff.lint]
# E = Error, F = Pyflakes, I = isort (Import sorting)
select = ["E", "F", "I"]
# Add "B" for bugbear if you want deeper logic checks
extend-select = ["B"] 
# B008: Do not perform function call in argument defaults
extend-ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"